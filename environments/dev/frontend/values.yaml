nameOverride: "frontend"
replicaCount: 2
image:
  repository: frontend
  tag: "latest"
  pullPolicy: Never
service:
  port: 80
ingress:
  enabled: true
  hosts:
    - host: myapp.local
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
