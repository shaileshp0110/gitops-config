fullnameOverride: "encryption-service-java"
replicaCount: 1
image:
  repository: encryption-service-java
  tag: latest
  pullPolicy: Never
service:
  port: 8080
env:
  - name: VAULT_ADDR
    value: "http://vault.vault.svc.cluster.local:8200"
  - name: VAULT_TOKEN
    value: "root"
  - name: KEY_NAME
    value: "demo-key"
