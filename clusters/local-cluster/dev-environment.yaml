# Deprecated for local minikube setup — use setup-minikube.sh which applies apps individually.
# The app-of-apps pattern reverts local frontend/backend image overrides by syncing from GitHub.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-environment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shaileshp0110/gitops-config.git
    path: environments/dev
    targetRevision: HEAD
    directory:
      recurse: true
      exclude: "{frontend/**,backend/**}"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
